<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO CIRCUIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; 
            font-family: 'Press Start 2P', cursive;
        }
        canvas { 
                    background-color: #000; 
                    border: 2px solid #555; 
                    max-width: 95vw;  /* 画面幅の95%を上限にする */
                    max-height: 85vh; /* 画面高さの85%を上限にする */
                    object-fit: contain; /* アスペクト比を維持 */
                }
        #game-container { position: relative; }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; /* ← これが重要！中身を「縦」に並べる */
            justify-content: center; /* 垂直方向の中央 */
            align-items: center;     /* 水平方向の中央 */
            background: rgba(0, 0, 0, 0.8);
            cursor: pointer;
            z-index: 10;
            text-align: center;
        }

        /* タイトルのスタイル */
        #start-screen h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #0FF;
            text-shadow: 3px 3px #F0F;
            margin: 0; /* 余計な隙間を消す */
        }

        /* メッセージ（Loading... / GAME OVER）のスタイル */
        #start-screen p {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #FFF;
            margin-top: 20px; /* タイトルとの間に少し隙間を作る */
            line-height: 1.8;  /* 2行になった時の行間を広げる */
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <div id="start-screen">
        <h2>ASTRO CIRCUIT</h2>
        <p>Loading Assets...</p>
    </div>
</div>

<script>
/** 入力管理 */
class InputManager {
    constructor() {
        this.keys = {};
        this.touchX = null;
        this.touchY = null;
        this.isTouching = false;

        window.addEventListener('keydown', (e) => this.keys[e.code] = true);
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);

        // タッチ / マウスイベント
        const canvas = document.getElementById('gameCanvas');
        const handleTouch = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // キャンバス内の座標に変換
            this.touchX = (clientX - rect.left) * (canvas.width / rect.width);
            this.touchY = (clientY - rect.top) * (canvas.height / rect.height);
        };

        canvas.addEventListener('mousedown', (e) => { this.isTouching = true; handleTouch(e); });
        window.addEventListener('mousemove', (e) => { if (this.isTouching) handleTouch(e); });
        window.addEventListener('mouseup', () => { this.isTouching = false; });

        canvas.addEventListener('touchstart', (e) => { this.isTouching = true; handleTouch(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { handleTouch(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchend', () => { this.isTouching = false; });
    }
    isPressed(keyCode) { return !!this.keys[keyCode]; }
}

/** オーディオ管理 */
class AudioManager {
    constructor() {
        this.bgm = new Audio('assets/bgm-stage1.mp3');
        this.bgm.loop = true;
        this.bgm.volume = 0.4;
        this.shotSoundPath = 'assets/shot.wav';
        this.explosionSoundPath = 'assets/explosion.wav';
    }
    playBGM() { this.bgm.play().catch(e => console.log("BGM Error", e)); }
    fadeOutBGM(duration = 2000) {
        if (!this.bgm) return;
        const startVolume = this.bgm.volume;
        const step = startVolume / (duration / 50);
        const interval = setInterval(() => {
            if (this.bgm.volume > step) {
                this.bgm.volume -= step;
            } else {
                this.bgm.volume = 0;
                this.bgm.pause();
                clearInterval(interval);
            }
        }, 50);
    }
    resetBGM() {
        this.bgm.currentTime = 0;
        this.bgm.volume = 0.4;
    }
    playShot() {
        const sound = new Audio(this.shotSoundPath);
        sound.volume = 0.3;
        sound.play().catch(() => {});
    }
    playExplosion() {
        const sound = new Audio(this.explosionSoundPath);
        sound.volume = 0.5;
        sound.play().catch(() => {});
    }
}

/** 背景 */
class Starfield {
    constructor(width, height) {
        this.width = width;
        this.height = height;
        this.starsLayer1 = this.createStars(40, 1);
        this.starsLayer2 = this.createStars(20, 3);
    }
    createStars(count, speed) {
        const stars = [];
        for (let i = 0; i < count; i++) {
            stars.push({ x: Math.random() * this.width, y: Math.random() * this.height, speed: speed + (Math.random() * 0.5) });
        }
        return stars;
    }
    update() {
        const move = (stars) => stars.forEach(s => { s.y += s.speed; if (s.y > this.height) s.y = 0; });
        move(this.starsLayer1); move(this.starsLayer2);
    }
    draw(ctx) {
        ctx.fillStyle = '#888'; this.starsLayer1.forEach(s => ctx.fillRect(s.x, s.y, 1, 1));
        ctx.fillStyle = '#FFF'; this.starsLayer2.forEach(s => ctx.fillRect(s.x, s.y, 2, 2));
    }
}


/** 敵クラス */
class Enemy {
    constructor(x, y, bulletType = 'aim') { // デフォルト値を設定
        this.x = x; this.y = y; this.bulletType = bulletType;
        this.width = 32; this.height = 32;
        this.speed = 2; this.active = true;
        this.shootTimer = Math.random() * 60;
        this.image = new Image();
        this.image.src = 'assets/enemy.jfif';
        this.isLoaded = false;
        this.image.onload = () => this.isLoaded = true;
    }

    update(game) {
        this.y += this.speed;
        if (this.y > 480) this.active = false;

        if (this.active && game) {
            this.shootTimer++;
            if (this.shootTimer > 120) {
                this.shoot(game); // 発射関数を呼び出す
                this.shootTimer = 0;
            }
        }
    }
    shoot(game) {
        const bx = this.x + this.width / 2;
        const by = this.y + this.height;

        // 自機への角度を共通で計算しておく
        const dx = (game.player.x + 16) - bx;
        const dy = (game.player.y + 16) - by;
        const baseAngle = Math.atan2(dy, dx);

        switch (this.bulletType) {
            case 'straight':
                game.entities.push(new EnemyBullet(bx - 3, by, 0, 4));
                break;

            case 'triple': {
                const tripleSpread = 0.3; // 弾の広がり
                const tripleSpeed = 3;    // 弾の速さ
                [baseAngle - tripleSpread, baseAngle, baseAngle + tripleSpread].forEach(angle => {
                    game.entities.push(new EnemyBullet(
                        bx - 3, by, 
                        Math.cos(angle) * tripleSpeed, 
                        Math.sin(angle) * tripleSpeed
                    ));
                });
                break;
            }

            case 'aim':
            default: {
                const aimSpeed = 4;
                game.entities.push(new EnemyBullet(
                    bx - 3, by, 
                    Math.cos(baseAngle) * aimSpeed, 
                    Math.sin(baseAngle) * aimSpeed
                ));
                break;
            }
        }
    }
    draw(ctx) {
        if (this.isLoaded) {
            ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
        }
    }
}

/** サインカーブ敵 */
class SineEnemy extends Enemy {
    constructor(x, y, phase, bulletType) {
        super(x, y, bulletType); // 親のコンストラクタへ渡す
        this.baseX = x;
        this.phase = phase;
        this.amplitude = 50;
        this.frequency = 0.05;
    }
    update(game) {
        super.update(game);
        this.x = this.baseX + Math.sin(this.phase) * this.amplitude;
        this.phase += this.frequency;
    }
}

class EnemyBullet {
    constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx; // 横方向の速度
        this.vy = vy; // 縦方向の速度
        this.width = 6;
        this.height = 6;
        this.active = true;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        // 画面外に出たら消す
        if (this.y > 480 || this.y < -50 || this.x > 320 || this.x < -50) {
            this.active = false;
        }
    }
    draw(ctx) {
        ctx.fillStyle = '#F0F';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
    }
}

/** 自機 */
class Player {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.width = 32; this.height = 32;
        this.speed = 5;
        this.image = new Image();
        this.image.src = 'assets/player.jfif';
        this.isLoaded = false;
        this.image.onload = () => this.isLoaded = true;
        this.alive = true; // ← 生存フラグを追加
    }
    update(input, cw, ch) {
        // キーボード操作
        if (input.isPressed('ArrowUp') && this.y > 0) this.y -= this.speed;
        if (input.isPressed('ArrowDown') && this.y < ch - this.height) this.y += this.speed;
        if (input.isPressed('ArrowLeft') && this.x > 0) this.x -= this.speed;
        if (input.isPressed('ArrowRight') && this.x < cw - this.width) this.x += this.speed;

        // タッチ操作（指の位置へ滑らかに移動）
        if (input.isTouching && input.touchX !== null) {
            const targetX = input.touchX - this.width / 2;
            const targetY = input.touchY - this.height / 2;
            
            // 遊び（デッドゾーン）を作ってガタつき防止
            if (Math.abs(this.x - targetX) > 2) this.x += (targetX - this.x) * 0.2;
            if (Math.abs(this.y - targetY) > 2) this.y += (targetY - this.y) * 0.2;
        }
    }
    draw(ctx) {
        if (!this.alive) return; // ← 死んでいるときは描画をスキップ！
        if (this.isLoaded) ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
        else { ctx.fillStyle = '#0FF'; ctx.fillRect(this.x, this.y, this.width, this.height); }
    }
}

/** 弾 */
class Bullet {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.width = 4; this.height = 12;
        this.speed = 8; this.active = true;
    }
    update(game) { this.y -= this.speed; if (this.y < -12) this.active = false; }
    draw(ctx) { ctx.fillStyle = '#FF0'; ctx.fillRect(this.x, this.y, this.width, this.height); }
}

/** 爆発パーティクル */
class Particle {
    constructor(x, y, type = 'enemy') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.active = true;

        if (type === 'player') {
            // --- 自機用のド派手な設定 ---
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 8 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 100; // 5秒待機に合わせて長く残る
            this.size = Math.random() * 4 + 2;
        } else {
            // --- 敵用のシンプルな設定 ---
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.life = 20;
            this.size = 2;
        }
    }

    update(game) {
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.type === 'player') {
            this.vx *= 0.96; // じわっと広がる
            this.vy *= 0.96;
            this.size *= 0.98; // 徐々に小さくなる
        }
        
        this.life--;
        if (this.life <= 0) this.active = false;
    }

    draw(ctx) {
        const ratio = this.life / (this.type === 'player' ? 100 : 20);
        
        if (this.type === 'player') {
            // 自機：白→オレンジ→赤と変化する
            ctx.fillStyle = `rgba(255, ${Math.floor(255 * ratio)}, ${Math.floor(100 * ratio)}, ${ratio})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // 敵：シンプルな黄色
            ctx.fillStyle = `rgba(255, 255, 100, ${ratio})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
}

/** シナリオ管理 */
class EnemyManager {
    constructor(scenario) { 
        this.scenario = scenario; 
        this.currentIndex = 0; 
        this.isFinished = false; 
    }
    
    update(frame, game) {
        // 全員出し切ったら終了フラグを立てる
        if (this.currentIndex >= this.scenario.length) {
            this.isFinished = true;
            return;
        }

        // 指定のフレームになったら敵を生成
        while (this.currentIndex < this.scenario.length && this.scenario[this.currentIndex].frame === frame) {
            const data = this.scenario[this.currentIndex];
            const bType = data.bulletType || 'straight';
            
            let enemy;
            if (data.type === 'sine') {
                enemy = new SineEnemy(data.x, -32, 0, bType);
                if (data.amplitude) enemy.amplitude = data.amplitude;
            } else {
                enemy = new Enemy(data.x, -32, bType);
            }

            game.entities.push(enemy);
            this.currentIndex++;
        }
    }

    // リセット時に呼び出す用
    reset() {
        this.currentIndex = 0;
        this.isFinished = false;
    }
}

/** ゲーム本体 */
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width; this.height = this.canvas.height;
        this.input = new InputManager();
        this.audio = new AudioManager();
        this.starfield = new Starfield(this.width, this.height);
        this.player = new Player(this.width / 2 - 16, this.height - 60);
        this.entities = [];
        this.isRunning = false;
        this.loopStarted = false; 
        this.frames = 0;
        this.isLoaded = false;
        this.enemyManager = null;
        this.isCleared = false;
        this.clearTimer = 0;
    }

    async init() {
        try {
            // シナリオの読み込み
            const res = await fetch('scenario.json');
            const data = await res.json();
            this.enemyManager = new EnemyManager(data);

            // 画像のプリロード（自機と敵）
            const loadImage = (src) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = src;
                    img.onload = () => resolve(img);
                });
            };

            // BGMの読み込み完了を待つPromiseを作成
            const loadAudio = (audio) => {
                return new Promise((resolve) => {
                    audio.oncanplaythrough = () => resolve();
                    audio.onerror = () => resolve(); // エラーでも進む
                    audio.load(); // 読み込み開始
                });
            };

            // 画像と一緒にBGMも待つ
            await Promise.all([
                loadImage('assets/player.jfif'),
                loadImage('assets/enemy.jfif'),
                loadAudio(this.audio.bgm) // これを追加
            ]);

            this.isLoaded = true;

            // ロード完了したら「Click to Start」を出す
            document.querySelector('#start-screen p').innerText = "Click to Start";
        } catch (e) { 
            console.error("Initialization Error", e); 
        }
    }

    start() {
        if (!this.isLoaded) return;
        if (this.isRunning) return;
        
        this.isRunning = true;
        this.audio.playBGM();
        document.getElementById('start-screen').style.display = 'none';

        // 最初の1回目だけループを起動するフラグ管理
        if (!this.loopStarted) {
            this.loopStarted = true;
            requestAnimationFrame((t) => this.loop(t));
        }
    }

    gameOver() {
        if (!this.isRunning) return; // 二重呼び出し防止
        this.isRunning = false;
        this.player.alive = false; // ← ここで自機を画面から消す！

        // 音の再生
        if (this.audio.bgm) { 
            this.audio.bgm.pause(); 
            this.audio.bgm.currentTime = 0; 
        }
        this.audio.playExplosion();

        // 自機用のド派手な爆発をここで生成（'player' を指定）
        for(let i = 0; i < 60; i++) {
            this.entities.push(new Particle(this.player.x + 16, this.player.y + 16, 'player'));
        }

        // 5秒待機
        setTimeout(() => {
            const startScreen = document.getElementById('start-screen');
            startScreen.style.display = 'flex';
            startScreen.querySelector('p').innerText = "GAME OVER\nClick to Restart";
            this.reset();
        }, 5000);
    }

    reset() {
        this.entities = []; 
        this.frames = 0;
        this.isCleared = false; // 追加
        this.clearTimer = 0;    // 追加
        this.audio.resetBGM(); // ボリュームと再生位置を戻す
        if (this.enemyManager) {
            this.enemyManager.reset(); // ← ここを this.enemyManager.reset() にするとより安全です
        }
        this.player.alive = true;
        this.player.x = this.width / 2 - 16;
        this.player.y = this.height - 60;
    }

    checkCollisions() {
        // 画面内に存在する「自機の弾」「敵」「敵の弾」をそれぞれ仕分け
        const bullets = this.entities.filter(e => e instanceof Bullet && e.active);
        const enemies = this.entities.filter(e => e instanceof Enemy && e.active);
        const eBullets = this.entities.filter(e => e instanceof EnemyBullet && e.active); 

        // ① 自機の弾 vs 敵 (ここは変更なし。敵への攻撃は当たりやすく)
        bullets.forEach(b => {
            enemies.forEach(e => {
                if (b.x < e.x + e.width && b.x + b.width > e.x && b.y < e.y + e.height && b.y + b.height > e.y) {
                    b.active = false; e.active = false;
                    for(let i=0; i<8; i++) this.entities.push(new Particle(e.x + 16, e.y + 16, 'enemy'));
                }
            });
        });

        // ゲームオーバー判定（自機が生きている時のみ）
        if (this.isRunning && this.player.alive) {
            
            // --- ここから修正：自機の小さな当たり判定（コア）を計算 ---
            const coreSize = 8; // コア（判定）の大きさ(px)
            const playerCenterX = this.player.x + this.player.width / 2;
            const playerCenterY = this.player.y + this.player.height / 2;
            
            // 自機のコア判定の四隅の座標
            const pCore = {
                left: playerCenterX - coreSize / 2,
                right: playerCenterX + coreSize / 2,
                top: playerCenterY - coreSize / 2,
                bottom: playerCenterY + coreSize / 2
            };
            // ------------------------------------------------------

            // ② 敵の弾 vs 自機 (新しい当たり判定を使用)
            eBullets.forEach(eb => {
                if (eb.x < pCore.right &&
                    eb.x + eb.width > pCore.left &&
                    eb.y < pCore.bottom &&
                    eb.y + eb.height > pCore.top) {
                    this.gameOver();
                }
            });

            // ③ 敵本体 vs 自機 (新しい当たり判定を使用)
            enemies.forEach(e => {
                if (e.x < pCore.right &&
                    e.x + e.width > pCore.left &&
                    e.y < pCore.bottom &&
                    e.y + e.height > pCore.top) {
                    this.gameOver();
                }
            });
        }
    }

    update() {
        this.starfield.update();

        // スペースキーでもスタートできるように (isRunningがfalseの時に判定)
        if (!this.isRunning && this.input.isPressed('Space')) {
            this.start();
        }
                
        if (this.isRunning && this.player.alive) { // プレイヤーが生きている時だけ動かす
            this.player.update(this.input, this.width, this.height);
            if (this.enemyManager) this.enemyManager.update(this.frames, this);

            // シナリオが終了し、画面内に敵がいなくなったらクリア！
            if (this.enemyManager.isFinished && !this.isCleared) {
                const enemies = this.entities.filter(e => e instanceof Enemy && e.active);
                if (enemies.length === 0) {
                    this.isCleared = true;
                    this.audio.fadeOutBGM(3000); // 3秒かけてフェードアウト
                }
            }
            // Zキー または 画面タッチ で発射
            const isFiring = this.input.isPressed('KeyZ') || this.input.isTouching;
            if (isFiring && this.frames % 10 === 0) {
                this.entities.push(new Bullet(this.player.x + this.player.width/2 - 2, this.player.y));
                this.audio.playShot();
            }            this.checkCollisions();
            this.frames++;
        }
        if (this.isCleared) {
            this.clearTimer++;
        }

        // 全エンティティの更新
        const currentEntities = [...this.entities]; 
            currentEntities.forEach(e => {
                if (e.update) e.update(this);
            });
        this.entities = this.entities.filter(e => e.active);
    }

    draw() {
        this.ctx.fillStyle = '#000'; this.ctx.fillRect(0, 0, this.width, this.height);
        this.starfield.draw(this.ctx);
        this.entities.forEach(e => e.draw(this.ctx));
        this.player.draw(this.ctx);

        // --- ステージクリア表示 ---
        if (this.isCleared) {
            this.ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            this.ctx.fillRect(0, this.height / 2 - 40, this.width, 80);

            this.ctx.font = '16px "Press Start 2P"'; // Google Fontsでの名前を指定
            this.ctx.fillStyle = '#0FF';
            this.ctx.textAlign = 'center';
            this.ctx.fillText('STAGE 1 CLEAR', this.width / 2, this.height / 2 + 8);
            
            // 5秒（300フレーム）経ったらリスタート画面へ
            if (this.clearTimer > 300) {
                this.isRunning = false;
                const startScreen = document.getElementById('start-screen');
                startScreen.style.display = 'flex';
                startScreen.querySelector('p').innerText = "CONGRATULATIONS!\nClick to Play Again";
                this.isCleared = false;
                this.clearTimer = 0;
                this.reset();
            }
        }
    }

    loop() {
        // isRunningがfalseでも、爆発アニメ（entities）を動かすためにupdateとdrawを呼ぶ
        this.update(); 
        this.draw();

        // gameOverになった後、5秒間はここが回り続ける
        requestAnimationFrame(() => this.loop());
    }
}

const game = new Game();
game.init().then(() => {
    document.getElementById('start-screen').addEventListener('click', () => {
        const p = document.querySelector('#start-screen p');
        if (p.innerText.includes("GAME OVER")) p.innerText = "Click to Start";
        game.start();
    });
});
</script>
